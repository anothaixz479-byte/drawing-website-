    <p class="text-gray-600 mb-4">คุณต้องการล้างภาพทั้งหมดหรือไม่?</p>
    <div class="flex gap-2"><button id="clear-cancel" class="flex-1 px-4 py-2 bg-gray-100 text-gray-600 rounded-xl hover:bg-gray-200">ยกเลิก</button> <button id="clear-confirm" class="flex-1 px-4 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600">ล้างทั้งหมด</button>

  <script>
    const defaultConfig = {
      app_title: '🎨 กระดานวาดรูป',
      primary_color: '#6366f1',
      secondary_color: '#8b5cf6',
      background_color: '#f8fafc',
      text_color: '#1f2937',
      surface_color: '#ffffff'
    };

    // Canvas setup
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentTool = 'pencil';
    let currentColor = '#1a1a1a';
    let brushSize = 5;
    let opacity = 1;
    let fillShape = false;
    let startX, startY;
    let history = [];
    let historyIndex = -1;
    let textPosition = null;

    // Initialize canvas
    function initCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
    }

    // Save state for undo/redo
    function saveState() {
      historyIndex++;
      history = history.slice(0, historyIndex);
      history.push(canvas.toDataURL());
      if (history.length > 50) {
        history.shift();
        historyIndex--;
      }
    }

    // Restore state
    function restoreState(index) {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = history[index];
    }

    // Get mouse position
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    // Drawing functions
    function startDrawing(e) {
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      startX = pos.x;
      startY = pos.y;

      if (currentTool === 'text') {
        textPosition = pos;
        document.getElementById('text-modal').classList.remove('hidden');
        document.getElementById('text-input').focus();
        isDrawing = false;
        return;
      }

      if (currentTool === 'fill') {
        floodFill(Math.floor(pos.x), Math.floor(pos.y), currentColor);
        saveState();
        isDrawing = false;
        return;
      }

      ctx.beginPath();
      ctx.moveTo(startX, startY);
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      
      const pos = getPos(e);
      
      ctx.globalAlpha = opacity;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (currentTool === 'pencil' || currentTool === 'brush') {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentTool === 'brush' ? brushSize * 2 : brushSize;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      } else if (currentTool === 'eraser') {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = brushSize * 2;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      } else if (['line', 'rectangle', 'circle'].includes(currentTool)) {
        restoreState(historyIndex);
        drawShape(pos.x, pos.y);
      }
    }

    function stopDrawing(e) {
      if (!isDrawing) return;
      
      const pos = e ? getPos(e) : { x: startX, y: startY };
      
      if (['line', 'rectangle', 'circle'].includes(currentTool)) {
        drawShape(pos.x, pos.y);
      }
      
      isDrawing = false;
      ctx.beginPath();
      ctx.globalAlpha = 1;
      saveState();
    }

    function drawShape(endX, endY) {
      ctx.strokeStyle = currentColor;
      ctx.fillStyle = currentColor;
      ctx.lineWidth = brushSize;
      ctx.globalAlpha = opacity;

      if (currentTool === 'line') {
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();
      } else if (currentTool === 'rectangle') {
        ctx.beginPath();
        if (fillShape) {
          ctx.fillRect(startX, startY, endX - startX, endY - startY);
        }
        ctx.strokeRect(startX, startY, endX - startX, endY - startY);
      } else if (currentTool === 'circle') {
        const radiusX = Math.abs(endX - startX) / 2;
        const radiusY = Math.abs(endY - startY) / 2;
        const centerX = startX + (endX - startX) / 2;
        const centerY = startY + (endY - startY) / 2;
        
        ctx.beginPath();
        ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
        if (fillShape) {
          ctx.fill();
        }
        ctx.stroke();
      }
    }

    // Flood fill algorithm
    function floodFill(x, y, fillColor) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const width = canvas.width;
      const height = canvas.height;
      
      const targetColor = getPixelColor(data, x, y, width);
      const fill = hexToRgb(fillColor);
      
      if (colorsMatch(targetColor, fill)) return;
      
      const stack = [[x, y]];
      const visited = new Set();
      
      while (stack.length > 0) {
        const [cx, cy] = stack.pop();
        const key = `${cx},${cy}`;
        
        if (visited.has(key)) continue;
        if (cx < 0 || cx >= width || cy < 0 || cy >= height) continue;
        
        const currentColor = getPixelColor(data, cx, cy, width);
        if (!colorsMatch(currentColor, targetColor)) continue;
        
        visited.add(key);
        setPixelColor(data, cx, cy, width, fill);
        
        stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
      }
      
      ctx.putImageData(imageData, 0, 0);
    }

    function getPixelColor(data, x, y, width) {
      const idx = (y * width + x) * 4;
      return { r: data[idx], g: data[idx + 1], b: data[idx + 2], a: data[idx + 3] };
    }

    function setPixelColor(data, x, y, width, color) {
      const idx = (y * width + x) * 4;
      data[idx] = color.r;
      data[idx + 1] = color.g;
      data[idx + 2] = color.b;
      data[idx + 3] = 255;
    }

    function colorsMatch(c1, c2, tolerance = 32) {
      return Math.abs(c1.r - c2.r) < tolerance &&
             Math.abs(c1.g - c2.g) < tolerance &&
             Math.abs(c1.b - c2.b) < tolerance;
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 0, g: 0, b: 0 };
    }

    // Event listeners
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);

    // Tool selection
    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
        
        // Update cursor
        if (currentTool === 'eraser') {
          canvas.style.cursor = 'cell';
        } else if (currentTool === 'fill') {
          canvas.style.cursor = 'crosshair';
        } else if (currentTool === 'text') {
          canvas.style.cursor = 'text';
        } else {
          canvas.style.cursor = 'crosshair';
        }
      });
    });

    // Color selection
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentColor = swatch.dataset.color;
        updatePreview();
      });
    });

    document.getElementById('custom-color').addEventListener('input', (e) => {
      currentColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      updatePreview();
    });

    // Brush size
    document.getElementById('brush-size').addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      document.getElementById('size-display').textContent = brushSize + 'px';
      updatePreview();
    });

    // Opacity
    document.getElementById('opacity').addEventListener('input', (e) => {
      opacity = parseInt(e.target.value) / 100;
      document.getElementById('opacity-display').textContent = e.target.value + '%';
      updatePreview();
    });

    // Fill shape
    document.getElementById('fill-shape').addEventListener('change', (e) => {
      fillShape = e.target.checked;
    });

    // Preview update
    function updatePreview() {
      const preview = document.getElementById('brush-preview');
      const size = Math.max(brushSize * 2, 4);
      preview.style.width = size + 'px';
      preview.style.height = size + 'px';
      preview.style.backgroundColor = currentColor;
      preview.style.opacity = opacity;
    }

    // Undo
    document.getElementById('undo-btn').addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        restoreState(historyIndex);

    // Redo
    document.getElementById('redo-btn').addEventListener('click', () => {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        restoreState(historyIndex);
      }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      document.getElementById('clear-modal').classList.remove('hidden');
    });

    document.getElementById('clear-cancel').addEventListener('click', () => {
      document.getElementById('clear-modal').classList.add('hidden');
    });

    document.getElementById('clear-confirm').addEventListener('click', () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      saveState();
      document.getElementById('clear-modal').classList.add('hidden');
    });

    // Download
    document.getElementById('download-btn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'my-drawing.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Text modal
    document.getElementById('text-cancel').addEventListener('click', () => {
      document.getElementById('text-modal').classList.add('hidden');
      document.getElementById('text-input').value = '';
      textPosition = null;
    });

    document.getElementById('text-confirm').addEventListener('click', () => {
      const text = document.getElementById('text-input').value;
      if (text && textPosition) {
        ctx.font = `${brushSize * 4}px 'Prompt', sans-serif`;
        ctx.fillStyle = currentColor;
        ctx.globalAlpha = opacity;
        ctx.fillText(text, textPosition.x, textPosition.y);
        ctx.globalAlpha = 1;
        saveState();
      }
      document.getElementById('text-modal').classList.add('hidden');
      document.getElementById('text-input').value = '';
      textPosition = null;
    });

    document.getElementById('text-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('text-confirm').click();
      }
    });

    // Resize handler
    window.addEventListener('resize', () => {
      const imageData = canvas.toDataURL();
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      const img = new Image();
      img.onload = () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = imageData;
    });

    // Element SDK
    async function onConfigChange(config) {
      const title = document.getElementById('app-title');
      if (title) {
        title.textContent = config.app_title || defaultConfig.app_title;
      }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['app_title', config.app_title || defaultConfig.app_title]
        ])
      });
    }

    // Initialize
    setTimeout(initCanvas, 100);
    updatePreview();
